<section class="sb-section sb-brand-strip">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-10">
    {% if section.title %}<h2 class="text-2xl font-bold text-gray-900 text-center mb-6">{{ section.title }}</h2>{% endif %}
    <div class="flex flex-wrap items-center justify-center gap-3">
      {% for item in section.brand_items %}
        <a href="/site_cars/?manufacturer={{ item.name }}" class="px-4 py-2 rounded-full bg-gray-50 text-gray-700 ring-1 ring-gray-200 hover:bg-gray-100 capitalize">
          {{ item.name }}
        </a>
      {% endfor %}
    </div>
  </div>
</section>
