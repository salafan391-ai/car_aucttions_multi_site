{% extends "base.html" %}
{% block title %}حذف — {{ site_name }}{% endblock %}

{% block content %}
<style>
    .lux-shop-del-page { background: var(--lux-bg); color: var(--lux-text); min-height: 70vh; padding: 4rem 1.5rem; display: flex; align-items: center; justify-content: center; }
    .lux-shop-del-page * { font-family: 'Playfair Display', 'Tajawal', serif; }
    .lux-shop-del-card {
        width: 100%; max-width: 460px; text-align: center;
        background: linear-gradient(180deg, #1a1612 0%, #0f0d0a 100%);
        border: 1px solid var(--lux-line); padding: 3rem 2.5rem;
    }
    .lux-shop-del-icon {
        width: 3.5rem; height: 3.5rem; margin: 0 auto 1.5rem;
        border: 1px solid rgba(217,119,119,0.45); color: #d97777;
        display: flex; align-items: center; justify-content: center;
    }
    .lux-shop-del-icon svg { width: 1.6rem; height: 1.6rem; }
    .lux-shop-del-eyebrow { color: #d97777; font-size: 0.7rem; letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 0.75rem; }
    .lux-shop-del-card h1 { font-size: 1.5rem; font-weight: 400; margin: 0 0 0.5rem; }
    .lux-shop-del-name { color: var(--lux-text-dim); font-size: 0.9rem; margin-bottom: 2rem; letter-spacing: 0.05em; }

    .lux-shop-del-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .lux-shop-del-cancel {
        padding: 0.85rem 1.75rem; text-decoration: none;
        border: 1px solid var(--lux-line); color: var(--lux-text-dim);
        font-size: 0.72rem; letter-spacing: 0.25em; text-transform: uppercase; transition: all 0.2s ease;
    }
    .lux-shop-del-cancel:hover { border-color: var(--lux-gold); color: var(--lux-gold); }
    .lux-shop-del-confirm {
        padding: 0.85rem 1.75rem;
        background: #c0392b; color: #fff; border: 1px solid #c0392b; cursor: pointer;
        font-family: inherit; font-size: 0.72rem; letter-spacing: 0.25em; text-transform: uppercase; transition: all 0.2s ease;
    }
    .lux-shop-del-confirm:hover { background: #d04436; border-color: #d04436; }

    :root.lux-light .lux-shop-del-card { background: linear-gradient(180deg, #fbf6e8 0%, #efe4ca 100%); border: 1px solid rgba(120, 92, 30, 0.30); }
</style>

<section class="lux-shop-del-page">
    <div class="lux-shop-del-card">
        <div class="lux-shop-del-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </div>
        <div class="lux-shop-del-eyebrow bilingual" data-lang-ar="حذف" data-lang-en="Delete" data-lang-es="Eliminar" data-lang-ru="Удалить">حذف</div>
        <h1 class="bilingual" data-lang-ar="تأكيد الحذف" data-lang-en="Confirm delete" data-lang-es="Confirmar eliminación" data-lang-ru="Подтвердите удаление">تأكيد الحذف</h1>
        <p class="lux-shop-del-name">{{ item.name }}</p>
        <div class="lux-shop-del-actions">
            <a href="{% url 'shop_manage' %}?kind={{ kind }}" class="lux-shop-del-cancel bilingual" data-lang-ar="إلغاء" data-lang-en="Cancel" data-lang-es="Cancelar" data-lang-ru="Отмена">إلغاء</a>
            <form method="post" action="{% url 'shop_delete' item.pk %}">{% csrf_token %}
                <button type="submit" class="lux-shop-del-confirm bilingual" data-lang-ar="حذف" data-lang-en="Delete" data-lang-es="Eliminar" data-lang-ru="Удалить">حذف</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
