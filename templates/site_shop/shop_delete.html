{% extends "base.html" %}
{% block title %}حذف — {{ site_name }}{% endblock %}

{% block content %}
<section class="max-w-md mx-auto px-4 py-16">
    <div class="bg-white rounded-2xl shadow-sm p-8 text-center">
        <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-red-50 text-red-500 flex items-center justify-center">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </div>
        <h1 class="text-lg font-bold text-gray-900 mb-2 bilingual" data-lang-ar="تأكيد الحذف" data-lang-en="Confirm delete">تأكيد الحذف</h1>
        <p class="text-sm text-gray-500 mb-6">{{ item.name }}</p>
        <div class="flex gap-3 justify-center">
            <a href="{% url 'shop_manage' %}?kind={{ kind }}" class="px-5 py-2.5 rounded-xl border border-gray-300 text-gray-700 font-bold text-sm bilingual" data-lang-ar="إلغاء" data-lang-en="Cancel">إلغاء</a>
            <form method="post" action="{% url 'shop_delete' item.pk %}">{% csrf_token %}
                <button type="submit" class="px-5 py-2.5 rounded-xl bg-red-500 hover:bg-red-600 text-white font-bold text-sm bilingual" data-lang-ar="حذف" data-lang-en="Delete">حذف</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
