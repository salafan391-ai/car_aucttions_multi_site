{% extends "base.html" %}

{% block title %}غير مصرّح - {{ site_name|default:"سيارات" }}{% endblock %}

    <a href="{% url 'site_dashboard' %}" class="inline-block bg-brand bg-brand-hover text-white text-sm font-bold px-6 py-2.5 rounded-xl transition">
