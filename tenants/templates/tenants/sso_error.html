<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تعذّر الدخول</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>* { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6"
      style="background: radial-gradient(60% 80% at 80% 0%, rgba(236,72,153,.16) 0%, transparent 60%),
                          radial-gradient(60% 80% at 20% 80%, rgba(139,92,246,.18) 0%, transparent 55%),
                          linear-gradient(180deg,#f8fafc,#eef2ff);">
  <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md text-center">
    <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-rose-500 to-pink-600 text-white text-3xl flex items-center justify-center mx-auto mb-5">
      <i class="fas fa-link-slash"></i>
    </div>
    <h2 class="text-2xl font-extrabold text-slate-800 mb-3">تعذّر فتح موقعك</h2>
    <p class="text-slate-500 leading-relaxed">{{ message }}</p>
  </div>
</body>
</html>
